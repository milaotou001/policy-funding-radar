name: Deploy to Aliyun

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-aliyun-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          port: ${{ secrets.ALIYUN_PORT }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail

            PROJECT_NAME="policy-funding-radar"
            PROJECT_PATH="/www/wwwroot/policy-funding-radar"
            BRANCH="master"
            REPO_URL="https://github.com/milaotou-tools/policy-funding-radar.git"

            echo "Preparing deployment for ${PROJECT_NAME}"

            mkdir -p "${PROJECT_PATH}"
            cd "${PROJECT_PATH}"
            git config --global --add safe.directory "${PROJECT_PATH}" || true

            if [ ! -d "${PROJECT_PATH}/.git" ]; then
              git init
            fi

            git remote remove origin >/dev/null 2>&1 || true
            git remote add origin "${REPO_URL}"
            git fetch origin "${BRANCH}"
            git checkout -B "${BRANCH}" "origin/${BRANCH}" --force

            bash deploy.sh
