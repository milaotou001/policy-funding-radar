name: Deploy to Aliyun

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-aliyun-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          port: ${{ secrets.ALIYUN_PORT }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail

            PROJECT_NAME="policy-funding-radar"
            PROJECT_PATH="/www/wwwroot/policy-funding-radar"
            BRANCH="master"
            REPO_URL="https://github.com/milaotou-tools/policy-funding-radar.git"

            echo "Preparing deployment for ${PROJECT_NAME}"

            if [ ! -d "${PROJECT_PATH}/.git" ]; then
              mkdir -p "${PROJECT_PATH}"
              cd "${PROJECT_PATH}"
              git init
              if git remote get-url origin >/dev/null 2>&1; then
                git remote set-url origin "${REPO_URL}"
              else
                git remote add origin "${REPO_URL}"
              fi
              git fetch origin "${BRANCH}"
              git checkout -B "${BRANCH}" "origin/${BRANCH}" --force
            fi

            cd "${PROJECT_PATH}"
            bash deploy.sh
